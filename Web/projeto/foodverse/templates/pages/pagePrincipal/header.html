{% load static %}

<nav class="navbar navbar-expand-lg fixed-top custom-navbar shadow-sm" id="mainNavbar">
  <div class="container-fluid px-3 px-lg-4">
    
    <a href="{% url 'home' %}" class="navbar-brand d-flex align-items-center">
      <img
        src="{% static 'img/logobc.svg' %}"
        alt="FoodVerse"
        class="logo-img"
        onerror="this.style.display = 'none'"
      />
    </a>

    <button
      class="navbar-toggler border-0 shadow-none ms-auto"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#menuNav"
      aria-controls="menuNav"
      aria-expanded="false"
      aria-label="Alternar navegação"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menuNav">
      
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item">
          <a class="nav-link nav-link-custom active" href="{% url 'home' %}">
            <i class="fa-solid fa-house me-2"></i>Início
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-link-custom" href="{% url 'restaurantes' %}">
            <i class="fa-solid fa-utensils me-2"></i>Restaurantes
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center ms-lg-4 mt-3 mt-lg-0 pb-3 pb-lg-0 border-top border-lg-0 border-secondary pt-3 pt-lg-0">
        
        {% if user.is_authenticated %}
        
        <a href="{% url 'carrinho' %}" class="btn-header-icon position-relative me-3" title="Carrinho">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
            2 </span>
        </a>

        <div class="nav-item dropdown dropdown-user">
          <a class="nav-link d-flex align-items-center gap-2" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="user-avatar shadow-sm">
              {{ user.username|make_list|first|upper }}
            </div>
            <span class="d-none d-lg-block text-white fw-bold">{{ user.username }}</span>
            <i class="fa-solid fa-chevron-down ms-1 text-white-50 small"></i>
          </a>
          
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 animate-fade-in mt-2 rounded-4" aria-labelledby="userDropdown">
            <li class="px-3 py-2 border-bottom">
              <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">Conectado como</small>
              <span class="fw-bold text-dark d-block text-truncate">{{ user.username }}</span>
            </li>
            <li>
              <a class="dropdown-item py-2" href="{% url 'perfil' %}">
                <i class="fa-solid fa-user-gear me-2 text-danger"></i>Meu Perfil
              </a>
            </li>
            <li>
              <a class="dropdown-item py-2" href="{% url 'pedido' %}">
                <i class="fa-solid fa-receipt me-2 text-danger"></i>Meus Pedidos
              </a>
            </li>
            <li><hr class="dropdown-divider my-1" /></li>
            <li>
              <a class="dropdown-item py-2 text-danger fw-bold" href="{% url 'logout' %}">
                <i class="fa-solid fa-right-from-bracket me-2"></i>Sair
              </a>
            </li>
          </ul>
        </div>

        {% else %}
        
        <div class="d-flex gap-2 w-100 mt-2 mt-lg-0">
          <a href="{% url 'cadastro' %}" class="btn btn-outline-light btn-sm rounded-pill px-4 fw-bold">Criar conta</a>
          <a href="{% url 'login' %}" class="btn btn-danger btn-sm rounded-pill px-4 fw-bold shadow-sm" style="background-color: #BC1015; border:none;">Entrar</a>
        </div>
        
        {% endif %}
      </div>
    </div>
  </div>
</nav>
