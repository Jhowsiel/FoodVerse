<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodVerse</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome 6.5 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=contact_support" />

  <!-- sass -->
  <link rel="stylesheet" href="sass/style.css">
</head>

<body class="bg-dark">
  <header class="bg-white p-3 shadow-sm">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">

        <!-- Logo à esquerda -->
        <a href="#" class="d-flex align-items-center text-black text-decoration-none fs-4 fw-bold">
          <img class="logo-img me-3" src="imgs/logo.png" alt="" style="height: 40px;">
        </a>

        <!-- Menu central -->
        <ul class="nav gap-4">
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">   
              <i class="fa-solid fa-magnifying-glass text-danger me-1"></i>
              Procurar comida
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">
              <i class="fa-solid fa-utensils text-danger me-1"></i>
              Para Empresas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-dark" href="#">
              <i class="fa-solid fa-circle-question text-danger me-1"></i>
              Fale Conosco
            </a>
          </li>
        </ul>

        <!-- Botões à direita -->
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light shadow-sm">
            <i class="fa-solid fa-user me-1"></i>
            Crie sua conta
          </button>
          <button class="btn btn-light shadow-sm">
            <i class="fa-solid fa-right-from-bracket me-1"></i>
            Entrar
          </button>
        </div>

      </div>
    </div>
  </header>
  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
